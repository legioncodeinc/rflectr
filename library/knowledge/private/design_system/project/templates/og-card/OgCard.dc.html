<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="OG / social card" description="A 1200×630 share card — the gold bees, the wordmark, the tagline, the install line" -->
<helmet>
<script src="./ds-base.js"></script>
<style>
  body { margin: 0; background: #18181c; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</helmet>
<div style="width: 1200px; height: 630px; position: relative; overflow: hidden; background: var(--bg-void); font-family: var(--font-sans); display: flex; flex-direction: column; align-items: center; justify-content: center;">
  <div class="comb-field" style="position: absolute; inset: 0; opacity: 0.5; -webkit-mask-image: radial-gradient(80% 75% at 50% 40%, #000 0%, transparent 72%); mask-image: radial-gradient(80% 75% at 50% 40%, #000 0%, transparent 72%);"></div>

  <!-- local badge -->
  <div style="position: relative; display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px; border-radius: 999px; background: var(--local-subtle); border: 1px solid var(--provider-border); margin-bottom: 30px;">
    <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--provider); box-shadow: 0 0 8px var(--provider);"></span>
    <span style="font-family: var(--font-mono); font-size: 14px; color: var(--provider);">runs on 127.0.0.1 · keys in your keychain</span>
  </div>

  <!-- the gold bees -->
  <img src="../../assets/rflectr-lockup-sm.png" alt="rflectr" style="position: relative; width: 760px; height: auto; display: block;">

  <!-- tagline -->
  <div style="position: relative; font-family: var(--font-display); font-weight: 700; font-size: 44px; letter-spacing: -0.04em; color: var(--text-primary); margin-top: 4px; text-align: center;">Point your agents at any model.</div>

  <!-- install line -->
  <div style="position: relative; display: inline-flex; align-items: center; gap: 12px; margin-top: 30px; padding: 12px 20px; border-radius: var(--radius-md); background: var(--bg-inset); border: 1px solid var(--border-strong); font-family: var(--font-mono); font-size: 18px; color: var(--text-primary);">
    <img src="../../assets/rflectr-mark.svg" width="24" height="24" alt="">
    <span><span style="color: var(--text-tertiary);">$</span> npm i -g @legioncodeinc/rflectr</span>
  </div>
</div>
</x-dc>
</body>
</html>
