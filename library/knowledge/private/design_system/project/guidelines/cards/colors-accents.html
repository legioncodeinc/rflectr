<!-- @dsCard group="Colors" viewport="700x220" name="Accents — provider · tool · gold" subtitle="Green = connected · violet = agents · gold = premium/honeycomb (sparing)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-canvas); display: flex; flex-direction: column; gap: 14px; }
  .grp { display: flex; gap: 12px; }
  .st { flex: 1; height: 66px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
  .scale { display: flex; border-radius: var(--radius-md); overflow: hidden; }
  .cell { flex: 1; height: 34px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; font-family: var(--font-mono); font-size: 10px; }
</style>
</head>
<body>
  <div class="grp">
    <div class="st" style="background:var(--provider)"><span class="n" style="color:var(--provider-on)">provider</span></div>
    <div class="st" style="background:var(--provider-subtle); border:1px solid var(--provider-border)"><span class="n" style="color:var(--provider)">connected</span></div>
    <div class="st" style="background:var(--tool)"><span class="n" style="color:var(--tool-on)">tool</span></div>
    <div class="st" style="background:var(--tool-subtle); border:1px solid var(--tool-border)"><span class="n" style="color:var(--tool)">agent</span></div>
    <div class="st" style="background:var(--gold)"><span class="n" style="color:var(--gold-on)">gold</span></div>
    <div class="st" style="background:var(--gold-subtle); border:1px solid var(--gold-border)"><span class="n" style="color:var(--gold)">premium</span></div>
  </div>
  <div class="scale">
    <div class="cell" style="background:var(--gold-50); color:#1A1305">50</div>
    <div class="cell" style="background:var(--gold-100); color:#1A1305">100</div>
    <div class="cell" style="background:var(--gold-200); color:#1A1305">200</div>
    <div class="cell" style="background:var(--gold-300); color:#1A1305">300</div>
    <div class="cell" style="background:var(--gold-400); color:#1A1305">400</div>
    <div class="cell" style="background:var(--gold-500); color:var(--gold-50)">500</div>
    <div class="cell" style="background:var(--gold-600); color:var(--gold-50)">600</div>
  </div>
</body>
</html>
