<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces — black ground" subtitle="Gold and relay-violet only ever sit on dark. Five steps." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-canvas); }
  .ramp { display: flex; gap: 10px; }
  .c { flex: 1; height: 96px; border-radius: var(--radius-md); border: 1px solid var(--border-default); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .h { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="c" style="background:var(--bg-void)"><span class="n">void</span><span class="h">#000000</span></div>
    <div class="c" style="background:var(--bg-canvas)"><span class="n">canvas</span><span class="h">#08080A</span></div>
    <div class="c" style="background:var(--bg-surface)"><span class="n">surface</span><span class="h">#0F0F13</span></div>
    <div class="c" style="background:var(--bg-elevated)"><span class="n">elevated</span><span class="h">#16161C</span></div>
    <div class="c" style="background:var(--bg-inset)"><span class="n">inset</span><span class="h">#050507</span></div>
  </div>
</body>
</html>
