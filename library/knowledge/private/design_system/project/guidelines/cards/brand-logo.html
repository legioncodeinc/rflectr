<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--bg-void); display: flex; align-items: center; gap: 38px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .wm { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; font-size: 40px; color: var(--text-primary); }
  .divider { width: 1px; height: 110px; background: var(--border-default); }
  .sizes { display: flex; align-items: flex-end; gap: 24px; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
  .chip { width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--text-primary); display: flex; align-items: center; justify-content: center; }
  .mono-white { color: var(--text-primary); display: flex; }
  .mono-ink { color: var(--bg-void); display: flex; }
  svg.inl { display: block; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../../assets/rflectr-mark.svg" width="58" height="58" alt="rflectr mark">
    <span class="wm">rflectr</span>
  </div>
  <div class="divider"></div>
  <div class="sizes">
    <div class="s"><img src="../../assets/rflectr-mark.svg" width="48" height="48" alt=""><span class="n">gradient 48</span></div>
    <div class="s"><span class="mono-white"><svg class="inl" width="34" height="34" viewBox="0 0 64 64" fill="none"><path d="M32 3 L57 17.5 L57 46.5 L32 61 L7 46.5 L7 17.5 Z" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.5"/><path d="M15 23 L25.5 32 L15 41" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M34 23 L44.5 32 L34 41" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M29.6 32 L32 28.4 L34.4 32 L32 35.6 Z" fill="currentColor"/></svg></span><span class="n">white 34</span></div>
    <div class="s"><span class="chip"><span class="mono-ink"><svg class="inl" width="22" height="22" viewBox="0 0 64 64" fill="none"><path d="M32 3 L57 17.5 L57 46.5 L32 61 L7 46.5 L7 17.5 Z" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.5"/><path d="M15 23 L25.5 32 L15 41" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M34 23 L44.5 32 L34 41" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M29.6 32 L32 28.4 L34.4 32 L32 35.6 Z" fill="currentColor"/></svg></span></span><span class="n">ink chip</span></div>
    <div class="s"><img src="../../assets/rflectr-favicon.svg" width="16" height="16" alt=""><span class="n">favicon 16</span></div>
  </div>
</body>
</html>
