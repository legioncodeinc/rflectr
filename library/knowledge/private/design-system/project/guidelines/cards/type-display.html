<!-- @dsCard group="Type" viewport="700x210" name="Display — Space Grotesk" subtitle="The wordmark + hero voice. Sharp, geometric, tight tracking." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-canvas); }
  .word { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; color: var(--text-primary); font-size: 72px; line-height: 1; }
  .word .dim { color: var(--relay); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 16px; display: flex; gap: 18px; }
  .line { font-family: var(--font-display); font-weight: 600; font-size: 26px; letter-spacing: -0.025em; color: var(--text-secondary); margin-top: 14px; }
</style>
</head>
<body>
  <div class="word">rflectr</div>
  <div class="line">Point your agents at any model.</div>
  <div class="meta"><span>Space Grotesk</span><span>700 / 600</span><span>tracking −0.04em</span></div>
</body>
</html>
