name: Release

# Publishes @legioncodeinc/rflectr to npm using OIDC trusted publishing.
# No NPM_TOKEN required — npmjs.com is configured to trust this workflow.
# Triggers when a GitHub Release is published (the tag must already exist).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      # `npm publish` runs prepublishOnly (build + version-sync check).
      # access:public comes from package.json publishConfig.
      # Provenance is generated automatically via OIDC.
      - name: Publish to npm
        run: npm publish
